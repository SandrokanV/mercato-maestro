name: Aggiornamento News Mercato Maestro

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Imposta Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests
          
      - name: Esegui il Bot
        run: python bot.py
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          
      - name: Commit e Push
        run: |
          git config --global user.name 'MercatoBot'
          git config --global user.email 'bot@mercatomaestro.local'
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m " Auto-update: nuove news" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
